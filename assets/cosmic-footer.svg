<svg viewBox="0 0 1200 170" width="1200" height="170" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thanks for visiting!">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#03020a"/>
      <stop offset="55%" stop-color="#0a0420"/>
      <stop offset="100%" stop-color="#170a37"/>
    </linearGradient>
    <radialGradient id="fglow" cx="50%" cy="118%" r="62%">
      <stop offset="0%" stop-color="#b9f6ff" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#7b2ff7" stop-opacity="0.42"/>
      <stop offset="70%" stop-color="#ff2fb0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff2fb0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="streak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#aef3ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7b2ff7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="22%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <mask id="ftopfade"><rect width="1200" height="170" fill="url(#topfade)"/></mask>
    <filter id="ftglow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#a05bff" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="0" stdDeviation="13" flood-color="#00d9ff" flood-opacity="0.4"/>
    </filter>
    <filter id="fsoft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <style>
    @keyframes ftwinkle { 0%,100% { opacity:.15; } 50% { opacity:1; } }
    @keyframes fbreathe { 0%,100% { opacity:.55; } 50% { opacity:.9; } }
    @keyframes fglowtxt { 0%,100% { opacity:.9; } 50% { opacity:1; } }
    @keyframes shoot { 0% { transform: translate(0,0); opacity:0; } 8% { opacity:1; } 26% { opacity:1; } 38% { transform: translate(360px,90px); opacity:0; } 100% { transform: translate(360px,90px); opacity:0; } }
    .fstar { animation: ftwinkle 3s ease-in-out infinite; }
    .fg    { animation: fbreathe 4s ease-in-out infinite; }
    .ftxt  { animation: fglowtxt 4s ease-in-out infinite; }
    .shoot { animation: shoot 7s ease-in infinite; }
  </style>

  <g mask="url(#ftopfade)">
    <rect width="1200" height="170" fill="url(#fbg)"/>
    <ellipse class="fg" cx="600" cy="180" rx="520" ry="150" fill="url(#fglow)" filter="url(#fsoft)"/>

    <g fill="#ffffff">
      <circle class="fstar" cx="110" cy="44"  r="1.5" style="animation-duration:2.7s"/>
      <circle class="fstar" cx="230" cy="92"  r="1.1" style="animation-duration:3.4s;animation-delay:.5s"/>
      <circle class="fstar" cx="330" cy="40"  r="1.8" style="animation-duration:2.9s;animation-delay:1.0s" fill="#aef3ff"/>
      <circle class="fstar" cx="470" cy="100" r="1.2" style="animation-duration:3.6s;animation-delay:.3s"/>
      <circle class="fstar" cx="600" cy="34"  r="1.3" style="animation-duration:3.1s;animation-delay:.8s"/>
      <circle class="fstar" cx="740" cy="98"  r="1.1" style="animation-duration:3.5s;animation-delay:.2s"/>
      <circle class="fstar" cx="860" cy="42"  r="1.7" style="animation-duration:2.8s;animation-delay:1.2s" fill="#d9b8ff"/>
      <circle class="fstar" cx="980" cy="96"  r="1.2" style="animation-duration:3.3s;animation-delay:.6s"/>
      <circle class="fstar" cx="1090" cy="46" r="1.5" style="animation-duration:2.9s;animation-delay:1.0s" fill="#aef3ff"/>
      <circle class="fstar" cx="60"  cy="100" r="1.1" style="animation-duration:3.7s;animation-delay:.4s"/>
      <circle class="fstar" cx="1150" cy="100" r="1.3" style="animation-duration:3.0s;animation-delay:.9s"/>
      <circle class="fstar" cx="400" cy="64"  r="1.0" style="animation-duration:3.4s;animation-delay:1.3s"/>
      <circle class="fstar" cx="800" cy="66"  r="1.0" style="animation-duration:3.2s;animation-delay:.7s"/>
    </g>

    <!-- shooting star tail -->
    <g class="shoot">
      <line x1="120" y1="30" x2="180" y2="45" stroke="url(#streak)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="180" cy="45" r="2" fill="#ffffff"/>
    </g>

    <text class="ftxt" x="600" y="92" text-anchor="middle" dominant-baseline="middle"
          font-family="'Segoe UI', 'Trebuchet MS', Arial, sans-serif" font-weight="800"
          font-size="26" letter-spacing="3" fill="#ffffff" filter="url(#ftglow)">✦&#160;&#160;Thanks for visiting!&#160;&#160;✦</text>
  </g>
</svg>
